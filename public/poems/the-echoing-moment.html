    #root { position: absolute; inset: 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">

// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook.
//
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },

  // Elastic
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

// ── Core interpolation helpers ──────────────────────────────────────────────

// Clamp a value to [min, max]
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// interpolate([0, 0.5, 1], [0, 100, 50], ease?) -> fn(t)
// Popmotion-style: linearly maps t across input keyframes to output values,
// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

// animate({from, to, start, end, ease})(t) — simpler single-segment tween.
// Returns `from` before `start`, `to` after `end`.
function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ────────────────────────────────────────────────────────

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });

const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ──────────────────────────────────────────────────────────────────
// Renders children only when the playhead is inside [start, end]. Provides
// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>
//
// Or as a plain wrapper — children can call useSprite() themselves.

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Sample sprite components ────────────────────────────────────────────────

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.
// Props: text, x, y, size, color, font, entryDur, exitDur, align
function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

// ImageSprite: scales + fades in; optional Ken Burns drift during hold.
function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null, // {label: string} for striped placeholder
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

// RectSprite: simple rectangle that animates position/size/color via props.
// Useful demo primitive — takes a `render` fn for per-frame customization.
function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}


function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  // Persist playhead
  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  // Auto-scale to fit viewport
  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44; // playback bar height
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  // Animation loop
  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  // Keyboard: space = play/pause, ← → = seek
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: '#0a0a0a',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      {/* Canvas area — vertically centered in remaining space */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      {/* Playback bar — stacked below canvas, never overlapping */}
      <PlaybackBar
        time={displayTime}
        actualTime={time}
        duration={duration}
        playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => { setTime(0); }}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

// ── Playback bar ────────────────────────────────────────────────────────────
// Play/pause, return-to-begin, scrub track, time display.
// Uses fixed-width time fields so layout doesn't thrash.

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',

      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>

      {/* Current time: fixed width so it doesn't thrash */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right',
        color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>

      {/* Scrub track */}
      <div
        ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1,
          height: 22,
          position: 'relative',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute',
          left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: `${pct}%`, top: '50%',
          width: 12, height: 12,
          marginLeft: -6, marginTop: -6,
          background: '#fff',
          borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>

      {/* Duration: fixed width */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left',
        color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 28, height: 28,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: 6,
        color: '#f6f4ef',
        cursor: 'pointer',
        padding: 0,
        transition: 'background 120ms',
      }}
    >
      {children}
    </button>
  );
}


Object.assign(window, {
  Easing, interpolate, animate, clamp,
  TimelineContext, useTime, useTimeline,
  Sprite, SpriteContext, useSprite,
  TextSprite, ImageSprite, RectSprite,
  Stage, PlaybackBar,
});


</script>
<script type="text/babel">

const W = 1920, H = 1080, DURATION = 74;

// ── Deterministic RNG ────────────────────────────────────────────────────────
function mkrng(seed) {
  let s = Math.abs((seed * 9301 + 49297) % 233280) || 1;
  return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
}

// ── Cell population ─────────────────────────────────────────────────────────
const CELLS = (() => {
  const arr = [];

  // Healthy: warm gold-teal, innocent
  for (let i = 0; i < 52; i++) {
    const rng = mkrng(i * 137 + 3);
    const isCenter = i < 4;
    arr.push({
      id: i, type: 'healthy',
      x: isCenter ? W/2 + (rng()-0.5)*320 : rng()*W,
      y: isCenter ? H/2 + (rng()-0.5)*220 : rng()*H,
      r: (isCenter ? 40 : 20) + rng()*62,
      phase:  rng()*Math.PI*2,
      driftA: rng()*Math.PI*2,
      driftS: 16 + rng()*28,
      hueOff: rng()*48,
      birthTime: isCenter ? 0 : 1.5 + rng()*22,
      deathStart: 63 + rng()*9,
    });
  }

  // Dark / death: deep violet-black, aggressive
  for (let i = 0; i < 28; i++) {
    const rng = mkrng((i+52)*137 + 9);
    arr.push({
      id: i+52, type: 'dark',
      x: rng()*W, y: rng()*H,
      r: 12 + rng()*42,
      phase:  rng()*Math.PI*2,
      driftA: rng()*Math.PI*2,
      driftS: 38 + rng()*60,
      hueOff: rng()*32,
      birthTime: 19 + rng()*14,
      deathStart: 48 + rng()*16,
    });
  }

  return arr;
})();

// ── Draw one cell ────────────────────────────────────────────────────────────
function drawCell(ctx, cell, t) {
  const isDark = cell.type === 'dark';
  const age = t - cell.birthTime;
  if (age < 0) return;

  const dyingAge = Math.max(0, t - cell.deathStart);
  const dying    = dyingAge > 0;

  const fadeIn  = Math.min(1, age / 2.4);
  const fadeOut = dying ? Math.max(0, 1 - dyingAge / 3.0) : 1;
  const op = fadeIn * fadeOut;
  if (op < 0.008) return;

  // Organic drift – layered sinusoids
  const b = isDark ? Math.max(0, Math.min(1, (t-20)/10)) * 75 : 0;
  const dx = (Math.cos(cell.driftA + t*0.068) + 0.45*Math.cos(cell.driftA*1.73 + t*0.041))*cell.driftS
           + Math.cos(t*0.31 + cell.phase)*b;
  const dy = (Math.sin(cell.driftA + t*0.068) + 0.45*Math.sin(cell.driftA*2.17 + t*0.052))*cell.driftS
           + Math.sin(t*0.24 + cell.phase)*b;
  const cx = ((cell.x + dx)%W + W)%W;
  const cy = ((cell.y + dy)%H + H)%H;

  // Size: pulse + death shrink
  const pr   = isDark ? 1.95 : 0.62;
  const pAmp = dying ? 0.04 : (isDark ? 0.10 : 0.15);
  const shrink = dying ? Math.max(0.04, 1 - dyingAge*0.28) : 1;
  const r = cell.r * (1 + Math.sin(t*pr + cell.phase)*pAmp) * shrink;

  // Colour
  const hue = isDark
    ? 258 + cell.hueOff + Math.sin(t*0.28 + cell.phase)*12
    :  40 + cell.hueOff + Math.sin(t*0.17 + cell.phase)*14;
  const sat = isDark ? 50 : 64;
  const litBase = isDark ? 18 : 56;
  const lit = (!isDark && dying) ? Math.max(18, litBase - dyingAge*9) : litBase;

  // Ambient glow
  const gR = r * (isDark ? 2.1 : 3.0);
  const g1 = ctx.createRadialGradient(cx, cy, r*0.15, cx, cy, gR);
  g1.addColorStop(0, `hsla(${hue},${sat}%,${lit}%,${(isDark?0.11:0.17)*op})`);
  g1.addColorStop(1, `hsla(${hue},${sat}%,${lit}%,0)`);
  ctx.beginPath(); ctx.arc(cx, cy, gR, 0, Math.PI*2);
  ctx.fillStyle = g1; ctx.fill();

  // Cytoplasm
  const g2 = ctx.createRadialGradient(cx - r*0.27, cy - r*0.22, 0, cx, cy, r);
  g2.addColorStop(0,   `hsla(${hue+14},${sat}%,${lit+13}%,${0.21*op})`);
  g2.addColorStop(0.6, `hsla(${hue},${sat-5}%,${lit}%,${0.12*op})`);
  g2.addColorStop(1,   `hsla(${hue-12},${sat-15}%,${lit-18}%,${0.05*op})`);
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = g2; ctx.fill();

  // Membrane
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = `hsla(${hue+18},${sat+12}%,${lit+24}%,${(isDark?0.44:0.66)*op})`;
  ctx.lineWidth = isDark ? 1.4 : 2.1;
  ctx.stroke();

  // Nucleus
  if (r > 11 && (!dying || dyingAge < 1.3)) {
    const nR   = r * 0.27;
    const nOp  = dying ? Math.max(0, 1 - dyingAge) : 1;
    const g3 = ctx.createRadialGradient(cx, cy, 0, cx, cy, nR);
    g3.addColorStop(0,   `hsla(${hue+38},${sat+22}%,${lit+34}%,${0.96*op*nOp})`);
    g3.addColorStop(0.5, `hsla(${hue+18},${sat+10}%,${lit+18}%,${0.55*op*nOp})`);
    g3.addColorStop(1,   `hsla(${hue},${sat}%,${lit+5}%,${0.10*op*nOp})`);
    ctx.beginPath(); ctx.arc(cx, cy, nR, 0, Math.PI*2);
    ctx.fillStyle = g3; ctx.fill();
  }

  // Organelles (vesicles) – healthy only
  if (!isDark && op > 0.22 && r > 18) {
    const rng2 = mkrng(cell.id * 83);
    const n = 3 + Math.floor(rng2()*3);
    for (let k = 0; k < n; k++) {
      const oA = rng2()*Math.PI*2 + t*(0.07 + rng2()*0.06);
      const oD = (0.28 + rng2()*0.44)*r;
      const oR = r*(0.046 + rng2()*0.034);
      ctx.beginPath();
      ctx.arc(cx + Math.cos(oA)*oD, cy + Math.sin(oA)*oD, oR, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${hue+28},${sat}%,${lit+19}%,${0.56*op})`;
      ctx.fill();
    }
  }

  // Dying debris – dark cells fragment
  if (isDark && dying && dyingAge < 2.5) {
    const rng3 = mkrng(cell.id * 211);
    const n = 5;
    for (let k = 0; k < n; k++) {
      const da = rng3()*Math.PI*2;
      const dd = r + dyingAge*r*1.4*rng3();
      const dr = r*(0.06 + rng3()*0.08) * Math.max(0, 1 - dyingAge);
      ctx.beginPath();
      ctx.arc(cx + Math.cos(da)*dd, cy + Math.sin(da)*dd, dr, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${hue},${sat}%,${lit+10}%,${0.3*(1 - dyingAge/2.5)*op})`;
      ctx.fill();
    }
  }
}

// ── Cell Canvas ──────────────────────────────────────────────────────────────
function CellCanvas() {
  const time = useTime();
  const ref  = React.useRef(null);

  React.useEffect(() => {
    const cv = ref.current; if (!cv) return;
    const ctx = cv.getContext('2d');

    // Background — shifts from warm-dark → cold-purple (battle) → warm-dark (rebirth)
    const battlePeak = Math.exp(-((time-37)**2)/90);
    const rebirthT   = Math.max(0, Math.min(1, (time-57)/10));
    const bgH = 20  + battlePeak*250 + rebirthT*10;
    const bgS = 6   + battlePeak*18  + rebirthT*6;
    const bgL = 1.5 + battlePeak*1.5 + rebirthT*3;
    ctx.fillStyle = `hsl(${bgH},${bgS}%,${bgL}%)`;
    ctx.fillRect(0, 0, W, H);

    // Healthy cells (bottom layer)
    for (const c of CELLS) if (c.type === 'healthy') drawCell(ctx, c, time);
    // Dark cells on top
    for (const c of CELLS) if (c.type === 'dark')    drawCell(ctx, c, time);

    // Vignette
    const vig = ctx.createRadialGradient(W/2, H/2, H*0.26, W/2, H/2, H*0.84);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.8)');
    ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

  }, [time]);

  return (
    <canvas ref={ref} width={W} height={H}
      style={{ position:'absolute', inset:0, width:'100%', height:'100%' }} />
  );
}

// ── Ambient rebirth glow ──────────────────────────────────────────────────────
function RebirthGlow() {
  const time = useTime();
  const g    = Math.max(0, Math.min(1, (time-60)/7));
  const fade = Math.max(0, Math.min(1, (DURATION - time)/3));
  const op   = g * fade;
  if (op < 0.01) return null;
  return (
    <div style={{
      position:'absolute', inset:0, pointerEvents:'none',
      background:`radial-gradient(ellipse at 50% 55%, hsla(42,85%,62%,${op*0.14}), transparent 68%)`,
    }}/>
  );
}

// ── Poem line ─────────────────────────────────────────────────────────────────
function PoemLine({ text, start, end }) {
  const time = useTime();
  if (time < start - 0.05 || time > end + 0.05) return null;
  const age    = time - start;
  const remain = end - time;
  const raw    = Math.min(age / 1.2, remain / 1.2, 1);
  const op     = Easing.easeInOutSine(Math.max(0, raw));

  return (
    <div style={{
      position:'absolute', left:0, bottom:'12%', width:'100%',
      textAlign:'center', pointerEvents:'none', userSelect:'none',
      fontFamily:"'EB Garamond', Georgia, serif",
      fontStyle:'italic', fontSize:50, fontWeight:400,
      color:`rgba(242,232,216,${op})`,
      letterSpacing:'0.028em', lineHeight:1.5,
      textShadow:`0 0 60px rgba(210,185,140,${op*0.55}), 0 2px 10px rgba(0,0,0,${op*0.85})`,
      transform:`translateY(${(1-op)*8}px)`,
      transition:'none',
    }}>
      {text}
    </div>
  );
}

// ── Title card ────────────────────────────────────────────────────────────────
function TitleCard() {
  const time = useTime();
  const raw  = Math.min(time/1.8, Math.max(0, (5-time)/2), 1);
  const op   = Easing.easeInOutSine(Math.max(0, raw));
  if (op < 0.01) return null;
  return (
    <div style={{
      position:'absolute', inset:0, display:'flex',
      flexDirection:'column', alignItems:'center', justifyContent:'center',
      pointerEvents:'none',
    }}>
      <div style={{
        fontFamily:"'EB Garamond', Georgia, serif",
        fontSize:80, fontWeight:500, letterSpacing:'0.07em',
        color:`rgba(240,230,212,${op})`,
        textShadow:`0 0 90px rgba(200,170,120,${op*0.75}), 0 0 200px rgba(150,110,60,${op*0.3})`,
        textAlign:'center',
      }}>
        The Echoing Moment
      </div>
    </div>
  );
}

// ── Screen label (for comment context) ───────────────────────────────────────
function ScreenLabelUpdater() {
  const time  = useTime();
  const floor = Math.floor(time);
  const ref   = React.useRef(null);
  React.useEffect(() => {
    let el = ref.current;
    while (el && !el.dataset.screenLabel) el = el.parentElement;
    if (el) el.dataset.screenLabel = `t=${floor}s`;
  }, [floor]);
  return <span ref={ref} style={{display:'none'}}/>;
}

// ── Poem lines schedule ───────────────────────────────────────────────────────
const LINES = [
  // Stanza 1 – innocent, warm, emergence
  { text: "Within the chambers of remembered time,",           start:  4.0, end:  8.5 },
  { text: "A single instant holds transformative might,",      start:  9.0, end: 13.5 },
  { text: "Where memory's soft whisper turns sublime,",        start: 14.0, end: 18.5 },
  { text: "And shadows of the past embrace the light.",        start: 19.0, end: 23.5 },
  // Stanza 2 – dark cells invade, tension
  { text: "What fragment of your story burns so bright,",      start: 25.5, end: 30.0 },
  { text: "That ripples through the years with silent song?",  start: 30.5, end: 35.0 },
  { text: "A breath, a touch, a sudden insight's flight,",     start: 35.5, end: 40.0 },
  { text: "That shifts the very essence where you belong.",    start: 40.5, end: 45.0 },
  // Stanza 3 – battle, revelation
  { text: "Some moments break like waves upon the shore,",     start: 47.0, end: 51.5 },
  { text: "Reshaping landscapes of the inner soul,",           start: 52.0, end: 56.5 },
  { text: "Revealing depths we never knew before,",            start: 57.0, end: 61.5 },
  { text: "Completing what was once an incomplete whole.",     start: 62.0, end: 66.0 },
  // Couplet – rebirth and hope
  { text: "In memory's embrace, we are reborn,",               start: 67.0, end: 71.0 },
  { text: "Where past and present dance till new paths form.", start: 70.5, end: 74.0 },
];

// ── Main composition ──────────────────────────────────────────────────────────
function EchoingMoment() {
  return (
    <div data-screen-label="t=0s" style={{position:'absolute', inset:0}}>
      <CellCanvas />
      <RebirthGlow />
      <TitleCard />
      {LINES.map((l, i) => <PoemLine key={i} {...l} />)}
      <ScreenLabelUpdater />
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  return (
    <Stage width={W} height={H} duration={DURATION} background="#080508" persistKey="echoing">
      <EchoingMoment />
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
