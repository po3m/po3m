<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Po3m</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: #0a0a0f;
            color: #e8e8e8;
            min-height: 100vh;
            line-height: 1.6;
            padding: 2rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        a.back { color: #666; text-decoration: none; }
        a.back:hover { color: #aaa; }
        h1 { font-size: 2rem; font-weight: 300; margin: 2rem 0 0.5rem; }
        .tagline { color: #888; margin-bottom: 2rem; }
        
        /* Auth */
        #auth-form { margin-bottom: 2rem; }
        #auth-form input {
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 1rem;
            width: 300px;
        }
        #auth-form button {
            padding: 0.75rem 1.5rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #e8e8e8;
            cursor: pointer;
            margin-left: 0.5rem;
        }
        
        /* Queue */
        .poem-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .poem-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .poem-title { font-size: 1.3rem; font-weight: 400; }
        .poem-meta { font-size: 0.85rem; color: #888; margin-top: 0.25rem; }
        .poem-text {
            white-space: pre-wrap;
            font-style: italic;
            color: #ccc;
            line-height: 1.8;
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
        }
        .poem-footer {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn-approve {
            background: rgba(100,200,100,0.1);
            border-color: rgba(100,200,100,0.3);
            color: #8f8;
        }
        .btn-approve:hover { background: rgba(100,200,100,0.2); }
        .btn-reject {
            background: rgba(200,100,100,0.1);
            border-color: rgba(200,100,100,0.3);
            color: #f88;
        }
        .btn-reject:hover { background: rgba(200,100,100,0.2); }
        .tag {
            display: inline-block;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.05);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: #888;
            margin-right: 0.25rem;
        }
        .empty { color: #666; text-align: center; padding: 3rem; }
        .count { color: #888; margin-bottom: 1rem; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← Po3m</a>
        <h1>Review Queue</h1>
        <p class="tagline">Approve or reject pending submissions.</p>
        
        <div id="auth-form">
            <input type="password" id="admin-key" placeholder="Admin API key">
            <button onclick="loadQueue()">Load Queue</button>
        </div>
        
        <div id="content" class="hidden">
            <p class="count" id="count"></p>
            <div id="queue"></div>
        </div>
    </div>
    
    <script>
        let adminKey = '';
        
        async function loadQueue() {
            adminKey = document.getElementById('admin-key').value;
            if (!adminKey) return alert('Please enter admin key');
            
            try {
                const res = await fetch('/api/admin/queue', {
                    headers: { 'Authorization': `Bearer ${adminKey}` }
                });
                
                if (!res.ok) {
                    alert('Invalid admin key');
                    return;
                }
                
                const data = await res.json();
                document.getElementById('content').classList.remove('hidden');
                document.getElementById('auth-form').classList.add('hidden');
                
                renderQueue(data.pending);
            } catch (err) {
                alert('Error loading queue');
            }
        }
        
        function renderQueue(poems) {
            const queue = document.getElementById('queue');
            const count = document.getElementById('count');
            
            count.textContent = `${poems.length} pending submission${poems.length !== 1 ? 's' : ''}`;
            
            if (poems.length === 0) {
                queue.innerHTML = '<div class="empty">No pending submissions 🎉</div>';
                return;
            }
            
            queue.innerHTML = poems.map(p => `
                <div class="poem-card" id="poem-${p.id}">
                    <div class="poem-header">
                        <div>
                            <div class="poem-title">${escapeHtml(p.title)}</div>
                            <div class="poem-meta">
                                by ${escapeHtml(p.author)} · ${p.email} · ${p.date}
                                <br>Shader: ${p.shader} · IP: ${p.ip || 'unknown'}
                            </div>
                        </div>
                    </div>
                    <div class="poem-text">${escapeHtml(p.poem)}</div>
                    <div>
                        ${(JSON.parse(p.tags || '[]')).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
                    </div>
                    <div class="poem-footer">
                        <button class="btn btn-approve" onclick="approve(${p.id}, '${p.slug}')">✓ Approve & Publish</button>
                        <button class="btn btn-reject" onclick="reject(${p.id})">✗ Reject</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function approve(id, slug) {
            if (!confirm('Publish this poem?')) return;
            
            try {
                const res = await fetch('/api/admin/approve', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${adminKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ id })
                });
                
                const data = await res.json();
                if (data.success) {
                    document.getElementById(`poem-${id}`).remove();
                    alert(`Published! ${data.url}`);
                } else {
                    alert(data.error || 'Error approving');
                }
            } catch (err) {
                alert('Error approving');
            }
        }
        
        async function reject(id) {
            if (!confirm('Reject this submission?')) return;
            
            try {
                const res = await fetch('/api/admin/reject', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${adminKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ id })
                });
                
                const data = await res.json();
                if (data.success) {
                    document.getElementById(`poem-${id}`).remove();
                } else {
                    alert(data.error || 'Error rejecting');
                }
            } catch (err) {
                alert('Error rejecting');
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
