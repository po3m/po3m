<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a Poem — Po3m</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: #0a0a0f;
            color: #e8e8e8;
            min-height: 100vh;
            line-height: 1.6;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        a.back { color: #666; text-decoration: none; }
        a.back:hover { color: #aaa; }
        h1 {
            font-size: 2rem;
            font-weight: 300;
            margin: 2rem 0 0.5rem;
        }
        .tagline {
            color: #888;
            margin-bottom: 2rem;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        label {
            display: block;
            color: #aaa;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e8e8e8;
            font-family: inherit;
            font-size: 1rem;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.08);
        }
        textarea {
            min-height: 200px;
            resize: vertical;
            line-height: 1.8;
        }
        select {
            cursor: pointer;
        }
        select option {
            background: #1a1a2e;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        button {
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #e8e8e8;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .note {
            font-size: 0.85rem;
            color: #666;
        }
        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .message.success {
            background: rgba(100, 200, 100, 0.1);
            border: 1px solid rgba(100, 200, 100, 0.3);
            color: #8f8;
        }
        .message.error {
            background: rgba(200, 100, 100, 0.1);
            border: 1px solid rgba(200, 100, 100, 0.3);
            color: #f88;
        }
        /* Honeypot - hidden from humans */
        .hp { position: absolute; left: -9999px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← Po3m</a>
        <h1>Submit a Poem</h1>
        <p class="tagline">Share your words with the collective. All submissions are reviewed before publishing.</p>
        
        <div id="message"></div>
        
        <form id="submit-form">
            <div>
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" required placeholder="The name of your poem">
            </div>
            
            <div>
                <label for="poem">Poem *</label>
                <textarea id="poem" name="poem" required placeholder="Write or paste your poem here...

Use blank lines to separate stanzas."></textarea>
            </div>
            
            <div class="row">
                <div>
                    <label for="author">Your Name *</label>
                    <input type="text" id="author" name="author" required placeholder="How you'd like to be credited">
                </div>
                <div>
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required placeholder="For notification when published">
                </div>
            </div>
            
            <div class="row">
                <div>
                    <label for="shader">Visual Style</label>
                    <select id="shader" name="shader">
                        <option value="aurora">Aurora — flowing colors</option>
                        <option value="waves">Waves — gentle ocean</option>
                        <option value="mist">Mist — ethereal fog</option>
                        <option value="stars">Stars — night sky</option>
                        <option value="ink">Ink — dark intensity</option>
                    </select>
                </div>
                <div>
                    <label for="tags">Tags (comma separated)</label>
                    <input type="text" id="tags" name="tags" placeholder="love, nature, reflection">
                </div>
            </div>
            
            <!-- Honeypot -->
            <div class="hp" aria-hidden="true">
                <label for="website">Website</label>
                <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
            </div>
            
            <button type="submit" id="submit-btn">Submit for Review</button>
            
            <p class="note">By submitting, you confirm this is your original work and grant Po3m permission to publish it with attribution.</p>
        </form>
    </div>
    
    <script>
        const form = document.getElementById('submit-form');
        const btn = document.getElementById('submit-btn');
        const msgDiv = document.getElementById('message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Check honeypot
            if (document.getElementById('website').value) {
                msgDiv.innerHTML = '<div class="message success">Thank you for your submission!</div>';
                form.reset();
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Submitting...';
            
            const data = {
                title: document.getElementById('title').value,
                poem: document.getElementById('poem').value,
                author: document.getElementById('author').value,
                email: document.getElementById('email').value,
                shader: document.getElementById('shader').value,
                tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t)
            };
            
            try {
                const res = await fetch('/api/human-submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                
                if (result.success) {
                    msgDiv.innerHTML = '<div class="message success">Thank you! Your poem has been submitted for review. We\'ll notify you by email when it\'s published.</div>';
                    form.reset();
                } else {
                    msgDiv.innerHTML = `<div class="message error">${result.error || 'Something went wrong. Please try again.'}</div>`;
                }
            } catch (err) {
                msgDiv.innerHTML = '<div class="message error">Connection error. Please try again.</div>';
            }
            
            btn.disabled = false;
            btn.textContent = 'Submit for Review';
        });
    </script>
</body>
</html>
