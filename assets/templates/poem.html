<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} — Po3m</title>
    <meta name="description" content="{{EXCERPT}}">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{EXCERPT}}">
    <meta property="og:type" content="article">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            background: #0a0a0f;
            color: #e8e8e8;
            min-height: 100vh;
            overflow: hidden;
        }
        
        #shader-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .poem-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        .poem-content {
            max-width: 700px;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }
        
        .meta {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 2rem;
        }
        
        .poem-text {
            font-size: 1.15rem;
            line-height: 2;
            white-space: pre-wrap;
            font-style: italic;
        }
        
        .tags {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .tag {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            color: #aaa;
        }
        
        .back-link {
            position: fixed;
            top: 2rem;
            left: 2rem;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            z-index: 10;
        }
        
        .back-link:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <canvas id="shader-canvas"></canvas>
    
    <a href="/" class="back-link">← Po3m</a>
    
    <div class="poem-container">
        <div class="poem-content">
            <h1>{{TITLE}}</h1>
            <div class="meta">by {{AUTHOR}} · {{DATE}}</div>
            <div class="poem-text">{{POEM}}</div>
            <div class="tags">
                {{TAGS}}
            </div>
        </div>
    </div>
    
    <script>
        // Shader: {{SHADER}}
        const canvas = document.getElementById('shader-canvas');
        const gl = canvas.getContext('webgl');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        
        window.addEventListener('resize', resize);
        resize();
        
        // Aurora shader (default)
        const vertexShader = `
            attribute vec2 position;
            void main() {
                gl_Position = vec4(position, 0.0, 1.0);
            }
        `;
        
        const fragmentShader = `
            precision mediump float;
            uniform float time;
            uniform vec2 resolution;
            
            void main() {
                vec2 uv = gl_FragCoord.xy / resolution;
                
                float wave1 = sin(uv.x * 3.0 + time * 0.5) * 0.5 + 0.5;
                float wave2 = sin(uv.y * 2.0 + time * 0.3) * 0.5 + 0.5;
                float wave3 = sin((uv.x + uv.y) * 4.0 + time * 0.4) * 0.5 + 0.5;
                
                vec3 color1 = vec3(0.1, 0.3, 0.5);
                vec3 color2 = vec3(0.2, 0.1, 0.4);
                vec3 color3 = vec3(0.0, 0.2, 0.3);
                
                vec3 finalColor = mix(color1, color2, wave1);
                finalColor = mix(finalColor, color3, wave2 * wave3);
                finalColor *= 0.6;
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;
        
        function createShader(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            return shader;
        }
        
        const program = gl.createProgram();
        gl.attachShader(program, createShader(gl.VERTEX_SHADER, vertexShader));
        gl.attachShader(program, createShader(gl.FRAGMENT_SHADER, fragmentShader));
        gl.linkProgram(program);
        gl.useProgram(program);
        
        const vertices = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
        
        const position = gl.getAttribLocation(program, 'position');
        gl.enableVertexAttribArray(position);
        gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);
        
        const timeUniform = gl.getUniformLocation(program, 'time');
        const resUniform = gl.getUniformLocation(program, 'resolution');
        
        function render(t) {
            gl.uniform1f(timeUniform, t * 0.001);
            gl.uniform2f(resUniform, canvas.width, canvas.height);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(render);
        }
        
        render(0);
    </script>
</body>
</html>
